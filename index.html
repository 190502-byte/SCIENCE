<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science - Advanced Network & Proxy Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0e1a;
      color: #e0e7ff;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.07) 0%, transparent 45%);
    }

    /* 背景のネットワーク風エフェクト（簡易版） */
    .background {
      position: fixed;
      inset: 0;
      background: 
        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
      opacity: 0.12;
      z-index: -2;
      filter: brightness(0.4) contrast(1.2) hue-rotate(190deg);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, rgba(10,14,26,0.75), rgba(10,14,26,0.92));
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 120px 20px 60px;
    }

    h1 {
      font-size: 5.5rem;
      font-weight: 800;
      background: linear-gradient(90deg, #60a5fa, #a78bfa, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -2px;
      text-shadow: 0 0 40px rgba(96, 165, 250, 0.4);
    }

    .subtitle {
      font-size: 1.5rem;
      margin-top: 1rem;
      color: #94a3b8;
      font-weight: 300;
      letter-spacing: 1.5px;
    }

    .search-container {
      max-width: 720px;
      margin: 80px auto;
      padding: 0 20px;
      position: relative;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(96, 165, 250, 0.25);
      border-radius: 9999px;
      overflow: hidden;
      box-shadow: 
        0 10px 40px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      transition: all 0.3s ease;
    }

    .input-wrapper:hover,
    .input-wrapper:focus-within {
      border-color: #60a5fa;
      box-shadow: 
        0 0 30px rgba(96, 165, 250, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(-2px);
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      padding: 22px 28px;
      font-size: 1.25rem;
      color: #e0e7ff;
      outline: none;
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border: none;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 0 40px;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      transform: scale(1.05);
    }

    .hint {
      text-align: center;
      margin-top: 1.8rem;
      color: #64748b;
      font-size: 0.95rem;
    }

    /* 左右のナビゲーション矢印（装飾） */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 3.5rem;
      color: rgba(96, 165, 250, 0.25);
      user-select: none;
      cursor: pointer;
      transition: color 0.3s;
    }

    .nav-arrow:hover {
      color: #60a5fa;
    }

    .left { left: 5%; }
    .right { right: 5%; }

    @media (max-width: 768px) {
      h1 { font-size: 4rem; }
      .search-container { margin: 60px auto; }
      input[type="text"] { padding: 18px 24px; }
      button { padding: 0 32px; }
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="left nav-arrow"><</div>
  <div class="right nav-arrow">></div>

  <header>
    <h1>Science</h1>
    <div class="subtitle">Advanced Network & Proxy Browser</div>
  </header>

  <div class="search-container">
    <div class="input-wrapper">
      <input type="text" placeholder="URL または検索ワードを入力" />
      <button>🔍</button>
    </div>
    <div class="hint">安全・高速・匿名で世界中の情報を探索</div>
  </div>

</body>
</html>
