<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <meta name="theme-color" content="#000000" />
  <title>Science</title>

  <!-- 必要なスクリプト（Ultraviolet / Daydream系を仮定） -->
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script src="/data/bundle.js" defer></script>
  <script src="/data/config.js" defer></script>
  <script src="/assets/config.js" defer></script>
  <script src="/assets/all.js" defer></script>
  <script src="/assets/js/home.js"></script>
  <script src="/assets/js/proxy.js" defer></script>
  <script src="/assets/js/index.js" defer></script>

  <!-- フォント難読化（Daydream由来） -->
  <link rel="stylesheet" href="/ob-fonts.css" />
  <script>
    window.FONT_OBFUSCATION_CONFIG = {
      enabled: true,
      defaultFont: "plusjakartasans",
      excludeInputs: false,
      obfuscateTitle: false,
      obfuscatePlaceholders: false
    };
  </script>
  <script src="/ob-fonts.js"></script>

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/be27c0ad9d.js" crossorigin="anonymous"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    body {
      /* あなたが送った表紙に近い画像（glowing blue world map with lines & nodes） */
      background: url('https://thumbs.dreamstime.com/b/global-network-connections-digital-world-map-glowing-lines-futuristic-digital-representation-earth-s-continents-405629893.jpg') no-repeat center center fixed;
      background-size: cover;
      background-color: #000814; /* 暗青フォールバック */
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 8, 20, 0.72); /* ダークオーバーレイでテキスト見やすく */
      z-index: 1;
    }
    #browser-container {
      position: relative;
      z-index: 2;
      height: 100vh;
      width: 100%;
    }
    .sidebar {
      position: relative;
      z-index: 3;
      /* sidebarのスタイルは元のCSSに依存。必要ならここに追加 */
    }
    .alignment-container-1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 4;
      color: white;
      width: 90%;
      max-width: 800px;
    }

    /* 検索フォーム（バー + ボタンを1つにまとめて隣接） */
    .search-form {
      position: relative;
      margin: 50px auto 0;
      max-width: 700px;
    }
    .search-input {
      width: 100%;
      padding: 18px 90px 18px 24px;
      font-size: 1.3rem;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
    }
    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.75);
    }
    .search-button {
      position: absolute;
      right: 4px;
      top: 4px;
      bottom: 4px;
      width: 70px;
      background: linear-gradient(135deg, #00b4ff, #0078c8);
      border: none;
      border-radius: 0 46px 46px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .search-button:hover {
      background: linear-gradient(135deg, #00c8ff, #0096e6);
      transform: scale(1.05);
    }
    .search-button i {
      font-size: 1.6rem;
      color: white;
    }

    h1 {
      font-size: 5rem;
      margin: 0;
      text-shadow: 0 0 35px rgba(0, 180, 255, 0.95);
    }
    p.subtitle {
      font-size: 1.8rem;
      margin: 15px 0;
      opacity: 0.92;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <!-- Sidebar（元のものを維持。スタイルは外部CSS依存） -->
  <div class="sidebar">
    <!-- ロゴ・ナビ・ダークモードトグルなど（必要に応じて内容を追加） -->
    <a href="/" id="logo"><img src="science-logo.png" alt="Science"></a>
    <a href="/" class="nav-active"><span>Home</span></a>
    <a href="/math" class="nav-btn"><span>Science Tools</span></a>
    <a href="/physics" class="nav-btn"><span>Research</span></a>
    <a href="/settings" class="nav-btn"><span>Settings</span></a>
    <!-- 時間表示やトグル -->
  </div>

  <!-- ブラウザ表示エリア -->
  <div id="align">
    <nav id="nav">
      <a onclick="exit()"><i class="fa-solid fa-xmark"></i></a>
      <span id="m"></span>
      <a onclick="erudaToggle()"><i class="fa-solid fa-code"></i></a>
      <a onclick="fullscreen()"><i class="fa-solid fa-expand"></i></a>
    </nav>
    <div id="browser-container"></div>
  </div>

  <!-- ホーム画面（タイトル + 検索フォーム） -->
  <div class="alignment-container-1">
    <h1>Science</h1>
    <p class="subtitle">Advanced Network & Proxy Browser</p>

    <form id="form" class="search-form">
      <input autofocus autocomplete="off" class="search-input" id="search" placeholder="URL または 検索ワードを入力" required />
      <button type="submit" class="search-button">
        <i class="fas fa-search"></i>
      </button>
    </form>
  </div>

  <!-- 検索処理スクリプト -->
  <script>
    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();
      let input = document.getElementById('search').value.trim();
      if (!input) return;

      let targetUrl = input;
      if (/^https?:\/\//i.test(input)) {
        targetUrl = input;
      } else if (input.includes('.') && !input.includes(' ')) {
        targetUrl = 'https://' + input;
      } else {
        targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(input);
      }

      try {
        const encoded = __uv$config.encodeUrl(targetUrl);
        const proxiedUrl = __uv$config.prefix + encoded;
        document.getElementById('browser-container').innerHTML = 
          `<iframe src="${proxiedUrl}" style="width:100%;height:100%;border:none;"></iframe>`;
        console.log('Science Loading:', proxiedUrl);
      } catch (err) {
        console.error('Error:', err);
        alert('読み込みエラー。コンソールを確認してください。');
      }
    });
  </script>

</body>
</html>
