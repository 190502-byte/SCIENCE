<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Proxy</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      background: #000;
      overflow: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      background: url('https://cdn.clipkit.co/tenants/591/articles/images/000/000/899/medium/f6cdf59b-823b-4c09-838c-b17ce3124e31.jpg?1593063420') center / cover no-repeat;
      z-index: -2;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45); /* 背景が派手なので文字視認性確保。0.35〜0.5で調整可 */
      z-index: -1;
    }
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }
    h1 {
      font-size: 5.8rem;
      font-weight: 800;
      margin: 0 0 0.6rem;
      letter-spacing: 2px;
      text-shadow: 0 8px 40px rgba(0,0,0,0.9);
    }
    .subtitle {
      font-size: 1.45rem;
      opacity: 0.88;
      margin: 0 0 6rem;
      max-width: 680px;
      line-height: 1.4;
    }
    .search-bar {
      position: relative;
      width: 100%;
      max-width: 680px;
    }
    input {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.2rem;
      border: none;
      border-radius: 999px;
      background: rgba(70, 70, 80, 0.8); /* 灰色半透明 */
      color: white;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      outline: none;
      box-shadow: 0 6px 30px rgba(0,0,0,0.5);
    }
    input::placeholder {
      color: rgba(220, 220, 240, 0.75);
    }
    button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      background: #0066ff;
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    button:hover {
      background: #0055dd;
      transform: translateY(-50%) scale(1.05);
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 10;
      background: #fff;
    }
    .close-btn {
      position: fixed;
      top: 25px;
      right: 35px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0,0,0,0.65);
      color: white;
      font-size: 2rem;
      border: none;
      cursor: pointer;
      display: none;
      z-index: 11;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1>Science</h1>
    <div class="subtitle">Advanced Network & Proxy Browser</div>

    <div class="search-bar">
      <input type="text" id="urlInput" placeholder="URL または 検索ワードを入力" autofocus>
      <button onclick="goProxy()">→</button>
    </div>
  </div>

  <iframe id="proxyFrame"></iframe>
  <button class="close-btn" onclick="closeProxy()">×</button>

  <script>
    const input = document.getElementById('urlInput');
    const frame = document.getElementById('proxyFrame');
    const closeBtn = document.querySelector('.close-btn');

    function goProxy() {
      let val = input.value.trim();
      if (!val) return;

      if (!val.startsWith('http')) {
        if (val.includes('.') && !val.includes(' ')) {
          val = 'https://' + val;
        } else {
          val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        }
      }

      frame.src = val;
      frame.style.display = 'block';
      closeBtn.style.display = 'block';
      document.querySelector('.container').style.display = 'none';
    }

    function closeProxy() {
      frame.src = '';
      frame.style.display = 'none';
      closeBtn.style.display = 'none';
      document.querySelector('.container').style.display = 'flex';
      input.value = '';
      input.focus();
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') goProxy();
    });
  </script>

</body>
</html>
