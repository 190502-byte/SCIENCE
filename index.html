<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Proxy</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: white;
    }
    .bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('YOUR_BACKGROUND_IMAGE_URL_OR_LOCAL_PATH_HERE') center/cover no-repeat;
      z-index: -2;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5); /* 文字が見える程度の暗さ。0.3〜0.6で調整 */
      z-index: -1;
    }
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 6rem;
      margin: 0 0 1rem;
      text-shadow: 0 0 30px rgba(0,0,0,0.9);
      letter-spacing: 3px;
    }
    p {
      font-size: 1.6rem;
      margin: 0 0 4rem;
      opacity: 0.9;
      text-shadow: 0 2px 10px black;
    }
    .input-wrap {
      position: relative;
      width: 100%;
      max-width: 700px;
    }
    input {
      width: 100%;
      padding: 18px 25px;
      font-size: 1.4rem;
      border: none;
      border-radius: 50px;
      background: rgba(255,255,255,0.1);
      color: white;
      backdrop-filter: blur(10px);
      outline: none;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    button {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: #006aff;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #0055cc;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 10;
      background: #000;
    }
    .close {
      position: fixed;
      top: 20px;
      right: 30px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 2rem;
      border: none;
      cursor: pointer;
      display: none;
      z-index: 11;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="container">
    <h1>Science</h1>
    <p>Advanced Network & Proxy Browser</p>

    <div class="input-wrap">
      <input type="text" id="input" placeholder="URL または 検索ワードを入力" autofocus>
      <button onclick="openProxy()">→</button>
    </div>
  </div>

  <iframe id="proxy"></iframe>
  <button class="close" onclick="closeProxy()">×</button>

  <script>
    const input = document.getElementById('input');
    const iframe = document.getElementById('proxy');
    const closeBtn = document.querySelector('.close');

    function openProxy() {
      let val = input.value.trim();
      if (!val) return;

      if (!val.match(/^https?:\/\//)) {
        if (val.includes('.') && !val.includes(' ')) {
          val = 'https://' + val;
        } else {
          val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        }
      }

      iframe.src = val;
      iframe.style.display = 'block';
      closeBtn.style.display = 'block';
      document.querySelector('.container').style.display = 'none';
    }

    function closeProxy() {
      iframe.src = '';
      iframe.style.display = 'none';
      closeBtn.style.display = 'none';
      document.querySelector('.container').style.display = 'flex';
      input.value = '';
      input.focus();
    }

    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') openProxy();
    });
  </script>

</body>
</html>
