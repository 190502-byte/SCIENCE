<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science Proxy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      color: white;
      background: #000;
      overflow: hidden;
    }
    /* 提供された写真をそのまま背景に */
    .background {
      position: fixed;
      inset: 0;
      background: url('ここに写真のURLを入れる') center center / cover no-repeat;
      z-index: 1;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55); /* 暗くして文字が見やすく */
      z-index: 2;
    }
    .content {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 4.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.4rem;
      opacity: 0.9;
      margin-bottom: 3rem;
      max-width: 600px;
    }
    .search-container {
      width: 100%;
      max-width: 680px;
      position: relative;
    }
    input[type="text"] {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.2rem;
      border: none;
      border-radius: 60px;
      background: rgba(255,255,255,0.12);
      color: white;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      outline: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    input::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .btn-go {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: #0066ff;
      color: white;
      border: none;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-go:hover {
      background: #0055dd;
      transform: translateY(-50%) scale(1.08);
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 10;
      display: none;
      background: #000;
    }
    .close-btn {
      position: fixed;
      top: 20px;
      right: 30px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.8rem;
      cursor: pointer;
      z-index: 11;
      display: none;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1>Science</h1>
    <div class="subtitle">Advanced Network & Proxy Browser</div>

    <div class="search-container">
      <input type="text" id="urlInput" placeholder="URL または 検索ワードを入力" autofocus />
      <button class="btn-go" onclick="go()">→</button>
    </div>
  </div>

  <iframe id="proxyFrame"></iframe>
  <button class="close-btn" onclick="closeProxy()">×</button>

  <script>
    const input = document.getElementById('urlInput');
    const frame = document.getElementById('proxyFrame');
    const closeBtn = document.querySelector('.close-btn');

    function go() {
      let val = input.value.trim();
      if (!val) return;

      // 簡易URL補完
      if (!val.startsWith('http://') && !val.startsWith('https://')) {
        if (val.includes('.') && !val.includes(' ')) {
          val = 'https://' + val;
        } else {
          // 検索ワードとしてGoogle検索に
          val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        }
      }

      frame.src = val;
      frame.style.display = 'block';
      closeBtn.style.display = 'block';
      document.querySelector('.content').style.display = 'none';
    }

    function closeProxy() {
      frame.src = 'about:blank';
      frame.style.display = 'none';
      closeBtn.style.display = 'none';
      document.querySelector('.content').style.display = 'flex';
      input.value = '';
      input.focus();
    }

    // Enterキーでも起動
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') go();
    });
  </script>

</body>
</html>
