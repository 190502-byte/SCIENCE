<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Proxy</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      background: #0a0e1a;
      overflow: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      background: url('bg.jpg') center/cover no-repeat;  /* ← 君のネットワーク地球画像をここに（ファイル名変えてもOK） */
      z-index: -2;
    }
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: 5.5rem;
      font-weight: 700;
      margin: 0 0 0.8rem;
      letter-spacing: 1px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }
    .subtitle {
      font-size: 1.4rem;
      opacity: 0.9;
      margin: 0 0 5rem;
      max-width: 600px;
    }
    .search-bar {
      position: relative;
      width: 100%;
      max-width: 620px;
    }
    input {
      width: 100%;
      padding: 16px 24px 16px 24px;
      font-size: 1.15rem;
      border: none;
      border-radius: 999px;
      background: rgba(60, 60, 70, 0.85);  /* 灰色っぽい半透明 */
      color: white;
      backdrop-filter: blur(8px);
      outline: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    input::placeholder {
      color: rgba(220, 220, 230, 0.7);
    }
    button {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: #0066ff;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    button:hover {
      background: #0055dd;
    }
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      z-index: 10;
      background: white;
    }
    .close {
      position: fixed;
      top: 20px;
      right: 30px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.8rem;
      cursor: pointer;
      display: none;
      z-index: 11;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="container">
    <h1>Science</h1>
    <div class="subtitle">Advanced Network & Proxy Browser</div>

    <div class="search-bar">
      <input type="text" id="input" placeholder="URL または 検索ワードを入力" autofocus>
      <button onclick="load()">→</button>
    </div>
  </div>

  <iframe id="frame"></iframe>
  <button class="close" onclick="closeFrame()">×</button>

  <script>
    const input = document.getElementById('input');
    const frame = document.getElementById('frame');
    const closeBtn = document.querySelector('.close');

    function load() {
      let val = input.value.trim();
      if (!val) return;

      if (!/^https?:\/\//i.test(val)) {
        if (val.includes('.') && !/\s/.test(val)) {
          val = 'https://' + val;
        } else {
          val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
        }
      }

      frame.src = val;
      frame.style.display = 'block';
      closeBtn.style.display = 'block';
      document.querySelector('.container').style.display = 'none';
    }

    function closeFrame() {
      frame.src = 'about:blank';
      frame.style.display = 'none';
      closeBtn.style.display = 'none';
      document.querySelector('.container').style.display = 'flex';
      input.value = '';
      input.focus();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') load();
    });
  </script>

</body>
</html>
