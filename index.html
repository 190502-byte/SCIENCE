<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <meta name="theme-color" content="#000000">
  <title>Science</title>
  <!-- UV必須ファイル（リポジトリに既にあるはず） -->
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <!-- particles.js で世界地図風ネットワーク背景 -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <style>
    /* 写真通りのスタイル（ダーク背景 + 青紫ネットワーク） */
    body, html {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: #000; color: #fff; font-family: sans-serif;
    }
    #particles-js {
      position: absolute; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #0a001f, #000);
    }
    .container {
      position: relative; z-index: 10; text-align: center; top: 30%;
      transform: translateY(-50%);
    }
    h1 {
      font-size: 5rem; margin: 0; letter-spacing: 10px;
      color: #fff; text-shadow: 0 0 30px #8a2be2, 0 0 60px #00bfff;
    }
    p {
      font-size: 1.4rem; margin: 20px 0 40px; opacity: 0.8;
    }
    form {
      max-width: 700px; margin: 0 auto; position: relative;
    }
    input {
      width: 100%; padding: 20px 25px; font-size: 1.3rem;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(0,212,255,0.4);
      border-radius: 50px; color: white; backdrop-filter: blur(10px);
    }
    input::placeholder { color: rgba(255,255,255,0.6); }
    button {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: #00d4ff; color: #000; border: none; border-radius: 50%;
      width: 50px; height: 50px; font-size: 1.8rem; cursor: pointer;
    }
    /* iframeは後で表示（フルスクリーン風） */
    #proxyFrame {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;
      display: none; /* 最初は隠す、Go押したら表示 */
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>

  <div class="container">
    <h1>Science</h1>
    <p>Advanced Network & Proxy Browser</p>

    <form id="proxyForm">
      <input id="inputUrl" placeholder="URL または 検索ワードを入力" autofocus autocomplete="off">
      <button type="submit">→</button> <!-- 青い丸ボタン -->
    </form>
  </div>

  <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals"></iframe>

  <script>
    // UV config（既存のuv.config.jsを尊重）
    const form = document.getElementById('proxyForm');
    const input = document.getElementById('inputUrl');
    const frame = document.getElementById('proxyFrame');

    form.addEventListener('submit', e => {
      e.preventDefault();
      let val = input.value.trim();
      if (!val) return;

      if (!/^https?:\/\//i.test(val)) {
        val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
      }

      const encoded = __uv$config.prefix + __uv$config.encodeUrl(val);
      frame.src = encoded;
      frame.style.display = 'block'; // 写真みたいに検索後フル表示
      document.querySelector('.container').style.display = 'none'; // 元のUI隠す（オプション）
    });

    // ネットワーク線背景（写真の地図線を再現）
    particlesJS('particles-js', {
      particles: {
        number: { value: 100, density: { enable: true, value_area: 800 } },
        color: { value: ['#00bfff', '#8a2be2', '#ffffff'] },
        shape: { type: 'circle' },
        opacity: { value: 0.4, random: true },
        size: { value: 2, random: true },
        line_linked: { enable: true, distance: 150, color: '#00bfff', opacity: 0.3, width: 1 },
        move: { enable: true, speed: 1.5, direction: 'none', random: true }
      },
      interactivity: { detect_on: 'canvas', events: { onhover: { enable: true, mode: 'grab' } } }
    });
  </script>
</body>
</html>
