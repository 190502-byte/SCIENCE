<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science - Advanced Network & Proxy Browser</title>
  <link rel="stylesheet" href="/style.css"> <!-- または assets/css/style.css -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
</head>
<body>
  <div id="particles-js"></div>

  <div class="container">
    <h1 style="color: #00ffff; text-shadow: 0 0 20px #00ffff;">Science</h1>
    <p>Advanced Network & Proxy Browser</p>

    <form id="proxyForm">
      <input id="inputUrl" placeholder="URL または 検索ワードを入力" autofocus autocomplete="off">
      <button type="submit">Go</button>
    </form>

    <iframe id="proxyFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  </div>

  <script>
    const form = document.getElementById('proxyForm');
    const input = document.getElementById('inputUrl');
    const frame = document.getElementById('proxyFrame');

    form.addEventListener('submit', e => {
      e.preventDefault();
      let val = input.value.trim();
      if (!val) return;

      if (!/^https?:\/\//i.test(val)) {
        val = 'https://www.google.com/search?q=' + encodeURIComponent(val);
      }

      const encoded = __uv$config.prefix + __uv$config.encodeUrl(val);
      frame.src = encoded;
    });

    // Particles背景（Scienceっぽく）
    particlesJS('particles-js', {
      particles: { number: {value: 80}, color: {value: '#00ffff'}, line_linked: {enable: true, color: '#00ffff'} },
      interactivity: { events: { onhover: {enable: true, mode: 'repulse'} } }
    });
  </script>
</body>
</html>
