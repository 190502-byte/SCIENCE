  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;

    <p style="font-size:1.5rem; margin:10px 0 40px;">Advanced Network & Proxy Browser</p>

    <form id="form" style="display:flex; justify-content:center; max-width:700px; margin:0 auto;">
      <input autofocus autocomplete="off" class="search" id="search" placeholder="URL または 検索ワードを入力" required />

        <i class="fas fa-search"></i>

      <a title="github" href="https://github.com/shuttlenetwork/shuttle">Github</a>
    </footer>
  </div>

  <script src="/assets/js/home.js"></script>

  <!-- 検索機能（エラー対策強化版） -->
  <script>
    window.addEventListener('load', function() {
      const form = document.getElementById('form');
      const ifr = document.getElementById('ifr');

      // UVが使える状態かチェック
      if (typeof __uv$config === 'undefined' || !__uv$config.prefix || typeof __uv$config.encodeUrl !== 'function') {
        console.error('Ultraviolet Proxy が準備できていません');
        alert('プロキシ機能が利用できません。\n\n考えられる原因:\n・ /uv/uv.config.js が読み込まれていない\n・ サーバー側でUltravioletが正しく動いていない\n・ ブラウザのコンソール(F12)を確認してください');
        form.onsubmit = function(e) {
          e.preventDefault();
          alert('現在プロキシが使えません。管理者へお問い合わせください。');
        };
        return;
      }

      console.log('Ultraviolet Proxy 準備完了');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const input = document.getElementById('search').value.trim();
        if (!input) return;

        let targetUrl = input;

        // 検索ワード → Google検索に変換
        if (!/^https?:\/\//i.test(input)) {
          if (input.includes('.') && !input.includes(' ')) {
            targetUrl = 'https://' + input;
          } else {
            targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(input);
          }
        }

        try {
          const encoded = __uv$config.encodeUrl(targetUrl);
          const proxiedUrl = __uv$config.prefix + encoded;
          ifr.src = proxiedUrl;
          console.log('Proxy URL:', proxiedUrl);
        } catch (err) {
          console.error('Proxyエラー:', err);
          ifr.src = 'data:text/html,<h2 style="color:red;text-align:center;margin-top:100px;">読み込みに失敗しました<br><small>' + err.message + '</small></h2>';
        }
      });
    });
  </script>

</body>
</html>
