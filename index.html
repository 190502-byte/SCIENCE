<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science - Advanced Network & Proxy Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0f1f;
      color: #d8e0ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 背景写真を忠実に再現するためのスタイル */
    .background {
      position: fixed;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000&auto=format&fit=crop') center/cover no-repeat;
      opacity: 0.18;
      z-index: -2;
      filter: 
        brightness(0.45) 
        contrast(1.15) 
        saturate(0.8) 
        hue-rotate(200deg)    /* 青紫寄りにシフト */
        sepia(0.1);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom, 
        rgba(10, 12, 30, 0.78) 0%, 
        rgba(20, 15, 50, 0.88) 50%, 
        rgba(10, 12, 30, 0.92) 100%
      );
      z-index: -1;
    }

    header {
      text-align: center;
      padding: 140px 20px 80px;
    }

    h1 {
      font-size: 6.2rem;
      font-weight: 900;
      background: linear-gradient(90deg, #5c9dff, #b08aff, #d18cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -3px;
      text-shadow: 0 0 50px rgba(92, 157, 255, 0.45);
    }

    .subtitle {
      font-size: 1.6rem;
      margin-top: 1.2rem;
      color: #a0b0e0;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }

    .search-container {
      max-width: 780px;
      margin: 90px auto;
      padding: 0 25px;
      position: relative;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      background: rgba(25, 35, 65, 0.65);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(92, 157, 255, 0.28);
      border-radius: 60px;
      overflow: hidden;
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.04);
      transition: all 0.35s ease;
    }

    .input-wrapper:hover,
    .input-wrapper:focus-within {
      border-color: #7ab0ff;
      box-shadow: 
        0 0 40px rgba(92, 157, 255, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.07);
      transform: translateY(-3px);
    }

    input[type="text"] {
      flex: 1;
      background: transparent;
      border: none;
      padding: 24px 32px;
      font-size: 1.35rem;
      color: #e0eaff;
      outline: none;
    }

    input::placeholder {
      color: #6b82a8;
    }

    button {
      background: linear-gradient(90deg, #4d90ff, #a070ff, #c080ff);
      border: none;
      color: white;
      font-size: 1.3rem;
      font-weight: 700;
      padding: 0 50px;
      cursor: pointer;
      transition: all 0.35s;
    }

    button:hover {
      background: linear-gradient(90deg, #70aaff, #c090ff, #e0a0ff);
      transform: scale(1.06);
    }

    .hint {
      text-align: center;
      margin-top: 2rem;
      color: #7a8db0;
      font-size: 1rem;
      letter-spacing: 0.5px;
    }

    /* 左右の矢印（装飾） */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 4rem;
      color: rgba(92, 157, 255, 0.3);
      user-select: none;
      cursor: pointer;
      transition: color 0.3s, transform 0.3s;
    }

    .nav-arrow:hover {
      color: #7ab0ff;
      transform: translateY(-50%) scale(1.15);
    }

    .left { left: 6%; }
    .right { right: 6%; }

    @media (max-width: 768px) {
      h1 { font-size: 4.5rem; }
      header { padding: 100px 15px 60px; }
      .search-container { margin: 70px auto; }
      input[type="text"] { padding: 20px 28px; font-size: 1.2rem; }
      button { padding: 0 40px; }
      .nav-arrow { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="left nav-arrow"><</div>
  <div class="right nav-arrow">></div>

  <header>
    <h1>Science</h1>
    <div class="subtitle">Advanced Network & Proxy Browser</div>
  </header>

  <div class="search-container">
    <div class="input-wrapper">
      <input type="text" placeholder="URL または検索ワードを入力" />
      <button>🔍</button>
    </div>
    <div class="hint">高速・匿名・セキュアに世界を探索</div>
  </div>

</body>
</html>
