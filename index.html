<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Science - Advanced Network & Proxy Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      background: #000;
      overflow: hidden;
    }
    .background {
      position: fixed;
      inset: 0;
      background: 
        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000') center/cover no-repeat;
      filter: brightness(0.5) contrast(1.2);
      z-index: 1;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 30% 70%, rgba(0,100,200,0.15), transparent 40%);
      z-index: 2;
    }
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: clamp(5rem, 18vw, 14rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      background: linear-gradient(90deg, #00b4ff, #7c00ff, #ff00aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.2em;
      text-shadow: 0 0 40px rgba(0,180,255,0.6);
    }
    .subtitle {
      font-size: clamp(1.4rem, 5vw, 2.8rem);
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 3rem;
      letter-spacing: 0.05em;
    }
    .search-container {
      position: relative;
      width: 100%;
      max-width: 720px;
    }
    input[type="text"] {
      width: 100%;
      padding: 18px 24px 18px 70px;
      font-size: 1.3rem;
      border: none;
      border-radius: 60px;
      background: rgba(40, 40, 60, 0.75);
      backdrop-filter: blur(12px);
      color: white;
      outline: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: all 0.3s;
    }
    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.5);
    }
    input[type="text"]:focus {
      background: rgba(60, 60, 90, 0.9);
      box-shadow: 0 0 0 4px rgba(0,180,255,0.4);
    }
    .search-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #0066ff, #00aaff);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0,100,255,0.5);
      transition: all 0.25s;
    }
    .search-btn:hover {
      transform: translateY(-50%) scale(1.08);
      box-shadow: 0 10px 30px rgba(0,120,255,0.7);
    }
    .arrows {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      opacity: 0.4;
      user-select: none;
      display: flex;
      gap: 4rem;
    }
    .arrow {
      cursor: pointer;
      transition: all 0.3s;
    }
    .arrow:hover {
      opacity: 0.9;
      transform: scale(1.2);
    }
  </style>
</head>
<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1>Science</h1>
    <div class="subtitle">Advanced Network & Proxy Browser</div>

    <div class="search-container">
      <input type="text" placeholder="URL または 検索ワードを入力" />
      <button class="search-btn">🔍</button>
    </div>

    <div class="arrows">
      <div class="arrow">&lt;</div>
      <div class="arrow">&gt;</div>
    </div>
  </div>

</body>
</html>
