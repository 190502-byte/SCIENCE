  <!-- 背景・ホーム画面を画像通りに調整 -->
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: url('https://thumbs.dreamstime.com/b/global-world-map-network-digital-earth-connection-futuristic-technology-background-communication-web-illustration-glowing-blue-402610835.jpg') no-repeat center center fixed;
      background-size: cover;
      background-position: center;
      background-color: #000814;
      font-family: 'Poppins', sans-serif;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 8, 20, 0.55); /* 地図が見えやすい薄めオーバーレイ */
      z-index: 1;
    }
    .alignment-container-1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 900px;
      text-align: center;
      color: white;
      z-index: 3;
    }
    .header-container h1 {
      font-size: 5.5rem;
      margin: 0 0 15px;
      text-shadow: 0 0 30px rgba(0, 180, 255, 0.9);
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.8rem;
      margin: 0 0 50px;
      opacity: 0.9;
    }
    form {
      display: flex;
      max-width: 650px;
      margin: 0 auto;
      background: rgba(255,255,255,0.08);
      border-radius: 60px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .search {
      flex: 1;
      padding: 18px 25px;
      font-size: 1.25rem;
      border: none;
      background: transparent;
      color: white;
    }
    .search::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .submit-button {
      width: 80px;
      background: #00aaff;
      border: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-button:hover {
      background: #0088dd;
    }
    #align, .sidebar {
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="sidebar">
    <a href="/" id="logo">
      <img src="shuttle.png" alt="Logo">
    </a>
    <a href="/" id="logo"></a>
    <a href="/" class="nav-active"><span>Home</span></a>
    <a href="/math" class="nav-btn"><span>Games</span></a>
    <a href="/physics" class="nav-btn"><span>Apps</span></a>
    <a href="/settings" class="nav-btn"><span>Settings</span></a>
    <a id="time" class="nav-btn" style="display: flex; justify-content: flex-end; margin-left: auto;"></a>
    <div>
      <input type="checkbox" class="checkbox" id="checkbox">
      <label for="checkbox" class="checkbox-label">
        <i class="fas fa-moon"></i>
        <i class="fas fa-sun"></i>
        <span class="ball"></span>
      </label>
    </div>
  </div>

  <script src="https://d3js.org/d3.v4.min.js"></script>
  <script src="https://d3js.org/d3-hexbin.v0.2.min.js"></script>
  <script src="/assets/js/proxy.js" defer></script>

  <div id="align">
    <nav id="nav">
      <a onclick="exit()">
        <i class="fa-solid fa-xmark" style="color: white; margin-right: auto; margin-left: 20px; font-size: 24px;cursor: pointer;"></i>
      </a>
      <span id="m" style="margin: auto;"></span>
      <a onclick="erudaToggle()">
        <i class="fa-solid fa-code" style="color: white; margin-left: auto; margin-right: 5px; font-size: 20px;cursor: pointer;"></i>
      </a>
      <a onclick="fullscreen()">
        <i class="fa-solid fa-expand" style="color: white; margin-left: auto; margin-right: 45px; font-size: 20px;cursor: pointer;"></i>
      </a>
    </nav>
    <iframe id="ifr" style="width:100%; height:100%; border:none;"></iframe>
  </div>

  <div class="alignment-container-1">
    <div class="header-container">
      <div class="logo-image">
        <h1 style="color: white; font-family: 'Poppins', sans-serif; text-align: center;">Science</h1>
      </div>
    </div>
    <p class="subtitle">Advanced Network & Proxy Browser</p>

    <form id="form">
      <input autofocus autocomplete="off" class="search" id="search" placeholder="URL または 検索ワードを入力" required />
      <button type="submit" class="submit-button">
        <i class="fas fa-search searchicon"></i>
      </button>
    </form>

    <div id="suggestions"></div>

    <div style="margin-top: 50px; z-index: 1;">
      <div class="ad-container"></div>
    </div>

    <footer>
      <a title="discord" href="https://discord.gg/xi">Discord</a>
      <a title="github" href="https://github.com/shuttlenetwork/shuttle">Github</a>
    </footer>
  </div>

  <script src="/assets/js/home.js"></script>
