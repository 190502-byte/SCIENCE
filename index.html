<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <meta name="theme-color" content="#000000" />
  <title>Science Proxy</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <script src="https://kit.fontawesome.com/be27c0ad9d.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script src="/assets/js/index.js" defer></script>
  <script src="/assets/js/particles.js" defer></script>
  <!-- 広告系はコメントアウト -->
</head>
<body>
  <div id="videoad"></div>

  <div class="sidebar">
    <a href="/" id="logo">
      <img src="shuttle.png" alt="Logo">
    </a>
    <a href="/" id="logo"></a>
    <a href="/" class="nav-active"><span>Home</span></a>
    <a href="/math" class="nav-btn"><span>Games</span></a>
    <a href="/physics" class="nav-btn"><span>Apps</span></a>
    <a href="/settings" class="nav-btn"><span>Settings</span></a>
    <a id="time" class="nav-btn" style="display: flex; justify-content: flex-end; margin-left: auto;"></a>
    <div>
      <input type="checkbox" class="checkbox" id="checkbox">
      <label for="checkbox" class="checkbox-label">
        <i class="fas fa-moon"></i>
        <i class="fas fa-sun"></i>
        <span class="ball"></span>
      </label>
    </div>
  </div>

  <script src="https://d3js.org/d3.v4.min.js"></script>
  <script src="https://d3js.org/d3-hexbin.v0.2.min.js"></script>
  <script src="/assets/js/proxy.js" defer></script>

  <div id="align">
    <nav id="nav">
      <a onclick="exit()">
        <i class="fa-solid fa-xmark" style="color: white; margin-right: auto; margin-left: 20px; font-size: 24px; cursor: pointer;"></i>
      </a>
      <span id="m" style="margin: auto;"></span>
      <a onclick="erudaToggle()">
        <i class="fa-solid fa-code" style="color: white; margin-left: auto; margin-right: 5px; font-size: 20px; cursor: pointer;"></i>
      </a>
      <a onclick="fullscreen()">
        <i class="fa-solid fa-expand" style="color: white; margin-left: auto; margin-right: 45px; font-size: 20px; cursor: pointer;"></i>
      </a>
    </nav>
    <iframe id="ifr" style="width:100%; height:100%; border:none;"></iframe>
  </div>

  <div class="alignment-container-1" style="margin-top:15%;">
    <div class="header-container">
      <div class="logo-image">
        <h1 style="color: white; font-family: 'Poppins', sans-serif; text-align: center;">Science</h1>
      </div>
    </div>
    <form id="form">
      <input autofocus autocomplete="off" class="search" id="search" placeholder="URL または 検索ワードを入力" required />
      <button type="submit" class="submit-button">
        <i class="fas fa-search searchicon"></i>
      </button>
    </form>
    <div id="suggestions"></div>
    <div style="margin-top: 50px; z-index: 1;">
      <div class="ad-container"></div>
    </div>
    <footer>
      <a title="discord" href="https://discord.gg/xi">Discord</a>
      <a title="github" href="https://github.com/shuttlenetwork/shuttle">Github</a>
    </footer>
  </div>

  <script src="/assets/js/home.js"></script>

  <!-- 読み込みエラー対策強化版スクリプト -->
  <script>
    window.addEventListener('load', () => {  // onloadでUV完全ロードを待機
      const form = document.getElementById('form');
      const ifr = document.getElementById('ifr');

      if (typeof __uv$config === 'undefined' || typeof __uv$config.encodeUrl !== 'function') {
        console.error('UV Proxyエラー: __uv$config または encodeUrl が利用できません。');
        console.log('確認事項: ');
        console.log('1. /uv/uv.config.js が正しく存在・ロードされているか');
        console.log('2. /uv/uv.bundle.js がロードされているか');
        console.log('3. サーバーでUltravioletが正しくセットアップされているか (service worker登録など)');
        alert('プロキシ設定エラーです。\nコンソール(F12)を開いて詳細を確認してください。');
        return;
      }

      console.log('UV Proxy 準備完了: config loaded');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const input = document.getElementById('search').value.trim();
        if (!input) return;

        let targetUrl = input;

        // 検索ワード → Google変換
        if (!/^https?:\/\//i.test(input) && !input.includes('.')) {
          targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(input);
        } else if (!/^https?:\/\//i.test(input)) {
          targetUrl = 'https://' + input;
        }

        try {
          const encoded = __uv$config.encodeUrl(targetUrl);
          const proxiedUrl = __uv$config.prefix + encoded;
          ifr.src = proxiedUrl;
          console.log('成功: ' + proxiedUrl);
        } catch (err) {
          console.error('読み込みエラー詳細:', err.message, err.stack);
          alert('読み込みエラーが発生しました。\n原因例:\n- 無効なURL\n- UV設定の問題\n- ネットワークエラー\n詳細はF12コンソールで確認');
          ifr.src = 'about:blank'; // エラー時はクリア
        }
      });
    });
  </script>

</body>
</html>
