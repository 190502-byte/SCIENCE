<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
  <meta name="theme-color" content="#000000" />
  <title>Science</title>

  <link rel="stylesheet" href="/assets/css/style.css" />
  <script src="https://kit.fontawesome.com/be27c0ad9d.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script src="/assets/js/index.js" defer></script>
  <script src="/assets/js/particles.js" defer></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: url('https://static.vecteezy.com/system/resources/previews/056/428/173/large_2x/glowing-world-map-futuristic-global-network-design-for-digital-media-photo.jpg') no-repeat center center fixed;
      background-size: cover;
      background-color: #000814;
      font-family: 'Poppins', sans-serif;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 8, 20, 0.65);
      z-index: 1;
    }
    .alignment-container-1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 900px;
      text-align: center;
      color: white;
      z-index: 3;
    }
    h1 {
      font-size: 5.5rem;
      margin: 0 0 15px;
      text-shadow: 0 0 30px rgba(0, 180, 255, 0.9);
    }
    .subtitle {
      font-size: 1.8rem;
      margin: 0 0 50px;
      opacity: 0.9;
    }
    form {
      display: flex;
      max-width: 650px;
      margin: 0 auto;
      background: rgba(255,255,255,0.08);
      border-radius: 60px;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .search {
      flex: 1;
      padding: 18px 25px;
      font-size: 1.25rem;
      border: none;
      background: transparent;
      color: white;
    }
    .search::placeholder {
      color: rgba(255,255,255,0.6);
    }
    .submit-button {
      width: 80px;
      background: #00aaff;
      border: none;
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-button:hover {
      background: #0088dd;
    }
    #align, .sidebar {
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

  <div class="overlay"></div>

  <div class="sidebar">
    <a href="/" id="logo">
      <img src="shuttle.png" alt="Logo">
    </a>
    <a href="/" id="logo"></a>
    <a href="/" class="nav-active"><span>Home</span></a>
    <a href="/math" class="nav-btn"><span>Games</span></a>
    <a href="/physics" class="nav-btn"><span>Apps</span></a>
    <a href="/settings" class="nav-btn"><span>Settings</span></a>
    <a id="time" class="nav-btn" style="display:flex;justify-content:flex-end;margin-left:auto;"></a>
    <div>
      <input type="checkbox" class="checkbox" id="checkbox">
      <label for="checkbox" class="checkbox-label">
        <i class="fas fa-moon"></i>
        <i class="fas fa-sun"></i>
        <span class="ball"></span>
      </label>
    </div>
  </div>

  <div id="align">
    <nav id="nav">
      <a onclick="exit()">
        <i class="fa-solid fa-xmark" style="color:white;margin-right:auto;margin-left:20px;font-size:24px;cursor:pointer;"></i>
      </a>
      <span id="m" style="margin:auto;"></span>
      <a onclick="erudaToggle()">
        <i class="fa-solid fa-code" style="color:white;margin-left:auto;margin-right:5px;font-size:20px;cursor:pointer;"></i>
      </a>
      <a onclick="fullscreen()">
        <i class="fa-solid fa-expand" style="color:white;margin-left:auto;margin-right:45px;font-size:20px;cursor:pointer;"></i>
      </a>
    </nav>
    <iframe id="ifr" style="width:100%;height:100%;border:none;"></iframe>
  </div>

  <div class="alignment-container-1">
    <h1>Science</h1>
    <p class="subtitle">Advanced Network & Proxy Browser</p>

    <form id="form">
      <input autofocus autocomplete="off" class="search" id="search" placeholder="URL または 検索ワードを入力" required />
      <button type="submit" class="submit-button">
        <i class="fas fa-search"></i>
      </button>
    </form>

    <div id="suggestions"></div>

    <footer style="margin-top:60px;">
      <a title="discord" href="https://discord.gg/xi">Discord</a> |
      <a title="github" href="https://github.com/shuttlenetwork/shuttle">Github</a>
    </footer>
  </div>

  <script src="/assets/js/home.js"></script>
  <script src="/assets/js/proxy.js" defer></script>

  <!-- 検索ボタン押下 → 元のShuttleプロキシ処理を優先（home.jsに任せる） -->
  <script>
    // 元のhome.jsがsubmitをハンドルしている場合に干渉しないよう、遅延で実行
    document.getElementById('form').addEventListener('submit', function(e) {
      // e.preventDefault() をしない → 元のhome.jsがイベントを処理できるようにする
      const input = document.getElementById('search').value.trim();
      if (!input) return;

      // 補完だけ行って、元の処理に渡す
      let url = input;
      if (!url.startsWith('http')) {
        if (url.includes('.') && !url.includes(' ')) {
          url = 'https://' + url;
        } else {
          url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        }
        document.getElementById('search').value = url; // 表示も更新
      }

      // home.js がこのイベントを拾ってプロキシ処理をするはず
      // もし拾わなければ、以下をコメントアウト解除でフォールバック
      /*
      setTimeout(() => {
        if (typeof __uv$config !== 'undefined' && __uv$config.encodeUrl) {
          try {
            const encoded = __uv$config.encodeUrl(url);
            document.getElementById('ifr').src = __uv$config.prefix + encoded;
          } catch (err) {
            console.error('フォールバックエラー:', err);
          }
        }
      }, 100); // 少し遅延してhome.jsの処理を優先
      */
    });
  </script>

</body>
</html>
